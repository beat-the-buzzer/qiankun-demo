# qiankun 微前端 Nginx 配置
# 服务器: 1.12.229.67
# 主应用: 4000, Vue子应用: 4001, React子应用: 4002, 孙子应用: 4003

# 主应用
server {
    listen 4000;
    server_name 1.12.229.67;

    location / {
        root /var/www/fronted/qiankun-fronted/main-app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}

# Vue 子应用
server {
    listen 4001;
    server_name 1.12.229.67;

    # 跨域配置
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
    add_header Access-Control-Allow-Headers '*';

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    location / {
        root /var/www/fronted/qiankun-fronted/sub-app-vue;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}

